<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 — Erreur serveur · Créer SonBonheur</title>
  <link rel="icon" type="image/png" href="/img/logoRond.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060d18;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: #f87171; top: -180px; left: -120px; }
    .blob-2 { width: 420px; height: 420px; background: #0284c7; bottom: -120px; right: -80px; }

    .error-code {
      font-size: clamp(7rem, 20vw, 11rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #f87171, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: clamp(1.2rem, 4vw, 1.75rem);
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 0.95rem;
      color: #64748b;
      max-width: 440px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-home:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid #1a3a5c;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 11px 24px;
      border-radius: 10px;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: #38bdf8; color: #e2e8f0; }

    .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .error-icon {
      width: 72px;
      height: 72px;
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="error-icon">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#f87171" stroke-width="2">
      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
      <line x1="12" y1="9" x2="12" y2="13"/>
      <line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </div>

  <div class="error-code">500</div>
  <h1 class="error-title">Erreur interne du serveur</h1>
  <p class="error-desc">
    Une erreur inattendue s'est produite de notre côté.<br>
    Notre équipe a été notifiée. Veuillez réessayer dans quelques instants.
  </p>
  <div class="actions">
    <a href="/" class="btn-home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Retour à l'accueil
    </a>
    <a href="javascript:location.reload()" class="btn-secondary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
      </svg>
      Réessayer
    </a>
  </div>
</body>
</html>
