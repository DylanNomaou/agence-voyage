<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page introuvable · Créer SonBonheur</title>
  <link rel="icon" type="image/png" href="/img/logoRond.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #060d18;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: #0284c7; top: -180px; left: -120px; }
    .blob-2 { width: 420px; height: 420px; background: #38bdf8; bottom: -120px; right: -80px; }

    .error-code {
      font-size: clamp(7rem, 20vw, 11rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
      margin-bottom: 16px;
    }

    .error-title {
      font-size: clamp(1.2rem, 4vw, 1.75rem);
      font-weight: 600;
      color: #e2e8f0;
      margin-bottom: 12px;
    }

    .error-desc {
      font-size: 0.95rem;
      color: #64748b;
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 10px;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-home:hover { opacity: 0.88; transform: translateY(-1px); }

    .btn-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: 1px solid #1a3a5c;
      color: #94a3b8;
      font-size: 0.85rem;
      font-weight: 500;
      padding: 11px 24px;
      border-radius: 10px;
      text-decoration: none;
      margin-left: 12px;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-secondary:hover { border-color: #38bdf8; color: #e2e8f0; }

    .actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    .plane {
      position: fixed;
      top: 30%;
      left: -80px;
      color: #1a3a5c;
      animation: fly 14s linear infinite;
      opacity: 0.4;
    }
    @keyframes fly {
      from { transform: translateX(0); }
      to   { transform: translateX(calc(100vw + 140px)); }
    }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="plane" aria-hidden="true">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
      <path d="M21 16v-2l-8-5V3.5c0-.83-.67-1.5-1.5-1.5S10 2.67 10 3.5V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
    </svg>
  </div>

  <div class="error-code">404</div>
  <h1 class="error-title">Page introuvable</h1>
  <p class="error-desc">
    Cette page n'existe pas ou a été déplacée.<br>
    Revenez à l'accueil pour continuer à explorer nos voyages.
  </p>
  <div class="actions">
    <a href="/" class="btn-home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      Retour à l'accueil
    </a>
    <a href="/dashboard.html" class="btn-secondary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Tableau de bord
    </a>
  </div>
</body>
</html>
